name: hrms-ph-1
version: '3.8'

services:
  db:
    image: hrms-ph-1-db:15-alpine
    build:
      context: .
      dockerfile: ./backend/Dockerfile.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hireflow
      - POSTGRES_USER=hireflow_user
      - POSTGRES_PASSWORD=hireflow_pass
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hireflow_user -d hireflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: hrms-ph-1-redis:7-alpine
    build:
      context: .
      dockerfile: ./backend/Dockerfile.redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: hrms-ph-1-backend:latest
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    environment:
      - DATABASE_URL=postgres://hireflow_user:hireflow_pass@db:5432/hireflow
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DEBUG=1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: hrms-ph-1-worker:latest
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    environment:
      - DATABASE_URL=postgres://hireflow_user:hireflow_pass@db:5432/hireflow
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    image: hrms-ph-1-worker:latest
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    environment:
      - DATABASE_URL=postgres://hireflow_user:hireflow_pass@db:5432/hireflow
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: hrms-ph-1-frontend:latest
    build: ./frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume:
  static_volume:
  frontend_node_modules:
  redis_data:
